<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>오늘 기분</title>
  <meta name="description" content="하루 한 번 기분을 톡 누르면 구름이가 오늘의 노래를 골라줘요." />
  <meta name="theme-color" content="#FBF6EE" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>@font-face{font-family:'Cafe24Ssurround';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_seven@1.1/Cafe24Ssurround.woff') format('woff');font-weight:700;font-display:swap;}</style>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="app" id="app">
    <div class="halo" id="halo" aria-hidden="true"></div>

    <div class="bar">
      <div class="bar__date" id="dateline">—</div>
      <div class="streak" id="streak" hidden>
        <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3c2 3 4 4.5 4 8a4 4 0 1 1-8 0c0-1.5.6-2.6 1.4-3.6.3 1.2 1 1.8 1.8 1.8C12 9 11 6.5 12 3Z" fill="var(--coral)"/></svg>
        <span id="streakN">0</span>일째
      </div>
    </div>

    <div class="head">
      <h1 class="title" id="title">오늘 구름이는<br>어떤 날씨일까요?</h1>
      <p class="sub" id="sub">기분을 톡 누르면 오늘의 노래가 와요</p>
    </div>

    <div class="hero"><div class="hero__m" id="hero" aria-hidden="true"></div></div>

    <div class="picker" id="moodPicker" role="group" aria-label="오늘의 기분 선택"></div>

    <!-- 전국 게이지: 증분4(Firebase) 전까지 예시 분포 -->
    <div class="card gauge" id="gauge">
      <div class="gauge__top">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="5" fill="var(--happy)"/><g stroke="var(--happy)" stroke-width="1.6" stroke-linecap="round"><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></g></svg>
        <span class="gauge__lab">지금 전국은 대체로 맑음</span>
      </div>
      <p class="gauge__sub">행복한 사람이 제일 많아요</p>
      <div class="gauge__bar" aria-hidden="true">
        <i class="s-happy" style="flex:58"></i><i class="s-flutter" style="flex:16"></i><i class="s-calm" style="flex:14"></i><i class="s-blue" style="flex:8"></i><i class="s-angry" style="flex:4"></i>
      </div>
    </div>

    <div class="card result" id="result" role="status" aria-live="polite" hidden></div>

    <button class="btn btn--ghost install" id="installBtn" hidden>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12M8 11l4 4 4-4M5 21h14"/></svg>
      홈 화면에 추가
    </button>

    <div class="foot">
      <span class="dot" id="swState">오프라인 캐시 준비 중…</span>
    </div>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
