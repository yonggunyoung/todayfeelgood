# webapp 모노레포 — nginx 라우팅 (Oracle 무료 티어)
#
# Phase 1 도메인 전략: 독립 도메인으로 쪼개지 않고 "메인도메인/font" 서브경로만 노출.
# (SEO 중복 콘텐츠 방지 — 독립 도메인 분리는 Phase 3에서 301+canonical)
#
# 포트:
#   - 메인 홈페이지(Next, home/)        : 127.0.0.1:3000
#   - 폰트 프론트엔드(Next, apps/font)   : 127.0.0.1:3001  (basePath=/font)
#   - 폰트 엔진(FastAPI, apps/font)      : 127.0.0.1:8000  ← 외부 비노출(loopback 전용)
#
# 보안: 엔진은 nginx로 프록시하지 않는다. 사용자 입력은 폰트 프론트의
#       BFF(/font/api/generate)가 서버측에서만 엔진을 호출한다(엔진 직노출 금지).

upstream font_frontend { server 127.0.0.1:3001; }
upstream home_app      { server 127.0.0.1:3000; }

server {
    listen 80;
    server_name _;   # TODO: 실제 도메인으로 교체

    # 그린 글씨 PNG 업로드 대비. 엔진/BFF의 2MB 상한과 정합(여유 두고 4m).
    client_max_body_size 4m;

    # ── 폰트 앱 ──────────────────────────────
    # basePath=/font 이므로 /font, /font/studio, /font/_next/*, /font/api/*
    # 모두 이 한 블록으로 프론트(Next)에 전달된다. 엔진은 여기 없음(BFF 경유).
    location /font {
        proxy_pass http://font_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";   # Next HMR/websocket
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;   # BFF 타임아웃(20s)보다 여유
    }

    # ── 메인 홈페이지 ────────────────────────
    location / {
        proxy_pass http://home_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
