# webapp 모노레포 — nginx 라우팅 (docker compose 버전)
#
# upstream{} 블록은 nginx 기동 시점에 DNS를 강제 해석한다 → 그 순간 대상 컨테이너가
# 없거나 같은 네트워크가 아니면 nginx 자체가 [emerg] 로 죽는다(크래시 루프).
# 그래서 upstream 대신 ★resolver + 변수 proxy_pass★ 로 "요청 시점"에 해석한다.
# (컨테이너 재기동·기동 순서·일시적 미존재에 강건. 도커 내부 DNS=127.0.0.11)
#
# 서비스명·포트는 docker-compose.yml 과 정합:
#   home(3000) / font(3001) / sticker(3002) / sign(3003) / kit(3004) / textmoji(3005)
#   engine(8000) — 외부 비노출, 앱 BFF에서만 호출(여기서 프록시하지 않음).

server {
    listen 80;
    server_name ddukkit.com www.ddukkit.com;   # 다른 도메인으로 운영 시 교체(webapp.conf와 정합)

    client_max_body_size 4m;   # 그린 PNG 등 대비(앱/엔진 2MB 상한과 정합)

    # ── 정규화: www → 비-www (canonical=ddukkit.com 과 일치, 검색 중복색인 방지) ──
    # Cloudflare 프록시가 TLS를 종단하므로 항상 https 로 보낸다($scheme은 http일 수 있음).
    # 비-www(ddukkit.com)도 DNS A 레코드가 있어야 함(walkthrough 1-5: @ 와 www 둘 다 추가).
    if ($host = www.ddukkit.com) {
        return 301 https://ddukkit.com$request_uri;
    }

    # 도커 내부 DNS. 변수 proxy_pass 와 짝을 이뤄 요청 시점 해석 → 기동 시 안 죽는다.
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /font {
        set $up_font font:3001;
        proxy_pass http://$up_font;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /sticker {
        set $up_sticker sticker:3002;
        proxy_pass http://$up_sticker;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /sign {
        set $up_sign sign:3003;
        proxy_pass http://$up_sign;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /kit {
        set $up_kit kit:3004;
        proxy_pass http://$up_kit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /textmoji {
        set $up_textmoji textmoji:3005;
        proxy_pass http://$up_textmoji;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 메인 홈페이지 ──
    location / {
        set $up_home home:3000;
        proxy_pass http://$up_home;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
