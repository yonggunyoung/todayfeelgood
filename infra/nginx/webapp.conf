# webapp 모노레포 — nginx 라우팅 (Oracle 무료 티어)
#
# Phase 1~2 도메인 전략: 독립 도메인으로 쪼개지 않고 "메인도메인/<앱>" 서브경로만 노출.
# (SEO 중복 콘텐츠 방지 — 독립 도메인 분리는 Phase 3에서 301+canonical)
#
# 포트:
#   - 메인 홈페이지(Next, home/)            : 127.0.0.1:3000
#   - 폰트공방(Next, apps/font, basePath /font)     : 3001
#   - 스티커공방(Next, apps/sticker, /sticker)       : 3002
#   - 싸인공방(Next, apps/sign, /sign)               : 3003
#   - 브랜드키트(Next, apps/kit, /kit)               : 3004
#   - 폰트 엔진(FastAPI)                     : 127.0.0.1:8000  ← 외부 비노출(loopback 전용)
#
# 보안: 엔진은 nginx로 프록시하지 않는다. 각 앱의 BFF(/<app>/api/generate)가
#       서버측에서만 엔진을 호출한다(엔진 직노출 금지).

upstream home_app     { server 127.0.0.1:3000; }
upstream font_app     { server 127.0.0.1:3001; }
upstream sticker_app  { server 127.0.0.1:3002; }
upstream sign_app     { server 127.0.0.1:3003; }
upstream kit_app      { server 127.0.0.1:3004; }

# 공통 프록시 헤더 (각 location에서 include 대신 반복 — 단순화)
server {
    listen 80;
    server_name _;   # TODO: 실제 도메인으로 교체

    client_max_body_size 4m;   # 그린 PNG 등 대비(앱/엔진 2MB 상한과 정합)

    # ── 앱별 서브경로 (basePath와 일치) ──
    # 각 앱은 /<app>, /<app>/*, /<app>/_next/*, /<app>/api/* 를 한 블록으로 받는다.
    location /font {
        proxy_pass http://font_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /sticker {
        proxy_pass http://sticker_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /sign {
        proxy_pass http://sign_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /kit {
        proxy_pass http://kit_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── 메인 홈페이지 ──
    location / {
        proxy_pass http://home_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
