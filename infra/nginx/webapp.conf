# webapp 모노레포 — nginx 라우팅 (Oracle 무료 티어)
#
# Phase 1 도메인 전략: 독립 도메인으로 쪼개지 않고 "메인도메인/font" 서브경로만 노출한다.
# (SEO 중복 콘텐츠 방지 — 독립 도메인 분리는 Phase 3에서 301+canonical로만)
#
# 포트 가정:
#   - 메인 홈페이지(Next, home/)        : 127.0.0.1:3000   (후속)
#   - 폰트 프론트엔드(Next, apps/font)   : 127.0.0.1:3001
#   - 폰트 엔진(FastAPI, apps/font)      : 127.0.0.1:8000
#
# server_name 은 실제 도메인으로 교체할 것.

upstream font_frontend { server 127.0.0.1:3001; }
upstream font_engine   { server 127.0.0.1:8000; }
# upstream home_app    { server 127.0.0.1:3000; }   # 후속(home/)

server {
    listen 80;
    server_name _;   # TODO: 실제 도메인으로 교체

    # 업로드 이미지(그린 글씨 PNG) 대비 바디 사이즈 여유
    client_max_body_size 8m;

    # ── 폰트 앱 ──────────────────────────────
    # 폰트 엔진 API: /font/api/* → FastAPI
    # (프론트의 BFF 프록시 /api/generate를 그대로 쓰면 이 블록은 선택사항이지만,
    #  엔진을 직접 노출하고 싶을 때를 위해 명시해 둔다.)
    location /font/engine/ {
        proxy_pass http://font_engine/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;   # 폰트 생성 여유
    }

    # 폰트 프론트엔드: /font, /font/* → Next.js (basePath=/font 가정)
    location /font {
        proxy_pass http://font_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";   # Next HMR/websocket
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── 메인 홈페이지 (후속) ─────────────────
    # location / {
    #     proxy_pass http://home_app;
    #     proxy_set_header Host $host;
    # }

    # 임시: 홈 준비 전까지 /font로 안내
    location = / {
        return 302 /font;
    }
}
