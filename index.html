<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>뚝딱 — 생활 도구 모음</title>
<meta name="description" content="영수증으로 냉장고 관리부터 60초 진영 대결까지 — 설치 없이 바로 쓰는 작은 도구들." />
<meta name="theme-color" content="#f7f2e7" />
<link rel="icon" href="./icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icon.svg" />
<meta property="og:title" content="뚝딱 — 생활 도구 모음" />
<meta property="og:description" content="설치 없이 바로 쓰는 작은 도구들" />
<meta property="og:type" content="website" />
<link rel="stylesheet" as="style" crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f7f2e7;--card:#fff;--ink:#2b2b2b;--ink2:#7a7468;--line:#e7e0d2;--accent:#2f9e6e}
  body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',system-ui,sans-serif;
       background:var(--bg);color:var(--ink);min-height:100dvh;-webkit-tap-highlight-color:transparent}
  .wrap{max-width:480px;margin:0 auto;padding:34px 18px 48px}
  header{text-align:center;margin:14px 0 26px}
  .logo{font-size:2.1rem;font-weight:800;letter-spacing:-.02em}
  .logo b{color:var(--accent)}
  .sub{color:var(--ink2);font-size:.92rem;margin-top:7px}
  .apps{display:flex;flex-direction:column;gap:12px}
  a.app{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
        border-radius:18px;padding:15px 16px;text-decoration:none;color:inherit;
        box-shadow:0 2px 10px rgba(0,0,0,.04);transition:transform .12s ease,box-shadow .12s ease}
  a.app:active{transform:scale(.985)}
  a.app:hover{box-shadow:0 6px 18px rgba(0,0,0,.08)}
  .emoji{font-size:1.9rem;width:54px;height:54px;display:grid;place-items:center;background:#f3efe3;border-radius:14px;flex:none}
  .meta{flex:1;min-width:0}
  .meta b{display:block;font-size:1.06rem;font-weight:700}
  .meta span{display:block;color:var(--ink2);font-size:.84rem;margin-top:3px;line-height:1.35}
  .go{color:var(--ink2);font-size:1.3rem;flex:none}
  footer{text-align:center;color:var(--ink2);font-size:.78rem;margin-top:30px;line-height:1.7}
  footer a{color:var(--ink2)}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo"><b>뚝딱</b></div>
      <div class="sub">설치 없이 바로 쓰는 작은 도구 모음</div>
    </header>
    <nav class="apps">
      <a class="app" href="./fridge/">
        <span class="emoji">🧊</span>
        <span class="meta"><b>냉비서</b><span>영수증으로 냉장고 등록 · 오늘의 레시피 추천</span></span>
        <span class="go">→</span>
      </a>
      <a class="app" href="./gwangclick/">
        <span class="emoji">⚡</span>
        <span class="meta"><b>광클대전</b><span>60초 진영 대결 — 오늘 내 편은?</span></span>
        <span class="go">→</span>
      </a>
      <!-- 앱 추가는 아래 카드를 복사해 href만 바꾸세요 (예: 너굴 폰트생성기)
      <a class="app" href="https://여기에-주소">
        <span class="emoji">🦝</span>
        <span class="meta"><b>너굴 폰트생성기</b><span>한 줄 설명</span></span>
        <span class="go">→</span>
      </a>
      -->
    </nav>
    <footer>
      뚝딱 · 문의 <a href="mailto:yonggunyoung@gmail.com">yonggunyoung@gmail.com</a><br/>
      <a href="./blog/">블로그</a>
    </footer>
  </div>
</body>
</html>
