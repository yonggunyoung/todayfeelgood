# ── CI: 프론트(pnpm) + 엔진(pytest) ──
# push / PR 시 모노레포 전체 빌드·린트와 엔진 테스트를 돌린다.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# 동일 브랜치의 이전 실행은 취소(러너 절약).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 프론트엔드: 설치 → 빌드 → 린트 ──
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build (all workspaces)
        run: pnpm -r build
        env:
          # 빌드 메모리 상한(러너 OOM 방지).
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Lint (all workspaces)
        run: pnpm -r lint

  # ── 엔진: pytest ──
  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/font/engine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/font/engine/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest
        run: pytest -q
