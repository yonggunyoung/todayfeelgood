<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>냉비서 — 내 냉장고 비서</title>
  <meta name="description" content="영수증 한 장으로 냉장고를 등록하고, 내 목표에 맞는 오늘의 요리를 추천받으세요. 요리 완료 한 번이면 재고가 알아서 줄어듭니다." />
  <meta name="theme-color" content="#f5f3ec" />
  <link rel="icon" href="/vendor/icon.svg" type="image/svg+xml" />
  <!-- 폰트: 루트 index.html과 동일 (Jua + Pretendard CDN). PWA manifest/apple-touch-icon은 토스 빌드에서 제외. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Jua&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="/vendor/css/styles.css" />
</head>
<body>
  <div id="shell">
    <header id="topbar">
      <div class="brand">
        <span class="brand-mark"><svg width="20" height="23" viewBox="0 0 100 120" aria-hidden="true"><rect x="22" y="14" width="56" height="94" rx="14" fill="#fff"/><rect x="27" y="54" width="46" height="3" rx="1.5" fill="#dcefe4"/><rect x="66" y="28" width="4" height="13" rx="2" fill="#0e8e4e"/><rect x="66" y="62" width="4" height="26" rx="2" fill="#0e8e4e"/><circle cx="42" cy="72" r="4.4" fill="#173b28"/><circle cx="58" cy="72" r="4.4" fill="#173b28"/><path d="M44 81 Q50 87 56 81" stroke="#173b28" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg></span>
        <div class="brand-text">
          <strong>냉비서</strong>
          <small id="top-date"></small>
        </div>
      </div>
      <div class="top-right">
        <span id="points-badge" class="pill pill-point" style="cursor:pointer" title="포인트 · 게임" onclick="UI.openPoints()">🅿 0</span>
        <span id="saved-badge" class="pill pill-save" style="cursor:pointer" title="탭하면 계산법이 나와요" onclick="UI.explainLedger()">₩0</span>
        <span id="sync-badge" class="pill pill-muted" style="cursor:pointer" title="탭하면 설명이 나와요" onclick="UI.explainSync()">로컬</span>
      </div>
    </header>

    <main id="view" aria-live="polite"></main>

    <nav id="tabbar">
      <button data-tab="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg>홈</button>
      <button data-tab="pantry"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="3" width="12" height="18" rx="2.5"/><line x1="6" y1="11" x2="18" y2="11"/><line x1="9" y1="6.5" x2="9" y2="8.5"/></svg>냉장고</button>
      <button data-tab="recipes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10h16v5a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4z"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="4" x2="8" y2="8"/><line x1="12" y1="3" x2="12" y2="8"/><line x1="16" y1="4" x2="16" y2="8"/></svg>레시피</button>
      <button data-tab="shopping"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5.5 8h13l-1.1 11.2a1 1 0 0 1-1 .8H7.6a1 1 0 0 1-1-.8z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg>장보기</button>
      <button data-tab="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="8" x2="20" y2="8"/><circle cx="9" cy="8" r="2.4"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="15" cy="16" r="2.4"/></svg>설정</button>
    </nav>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <!-- 토스 미니앱 엔트리. (루트 index.html의 서비스워커 등록 <script>는 의도적으로 제거함 — 토스 WebView에서는 SW 불필요.) -->
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
