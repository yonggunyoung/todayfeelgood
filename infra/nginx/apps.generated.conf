# 자동 생성 파일 — 직접 수정 금지. 원본: /apps.json · 생성: infra/scripts/sync-apps.mjs

# gwangclick (광클대전) — 정적앱(레포 self-host)
location = /gwangclick { return 308 /gwangclick/; }
location /gwangclick/ {
    alias /srv/static-apps/gwangclick/;
    index index.html;
    try_files $uri $uri/ /gwangclick/index.html;
}

