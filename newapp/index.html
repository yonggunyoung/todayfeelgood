<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>오늘 기분</title>
  <meta name="description" content="하루 한 번 기분을 탭하면 오늘의 노래를 받는 앱." />
  <meta name="theme-color" content="#FF6F50" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <!-- ⚠️ 임시 기능 셸. 디자인 시안(preview.html) 도착 시 이 마크업·스타일을 교체한다.
       로직은 js/store.js · js/recommend.js · js/data/* 에 분리되어 그대로 재사용된다. -->
  <main class="app">
    <header class="app__head">
      <p class="app__sub" id="dateline">—</p>
      <h1 class="app__title">오늘 기분 어때요?</h1>
    </header>

    <section class="card" id="moodPicker" aria-label="기분 선택"></section>
    <section class="card" id="result" hidden></section>

    <button class="btn btn--ghost" id="installBtn" hidden>📲 홈 화면에 설치</button>

    <footer class="app__foot">
      <span id="swState" class="dot">오프라인 캐시 준비 중…</span>
    </footer>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
