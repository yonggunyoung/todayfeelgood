<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>음악 관리 · 관리자 — 오늘 기분</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    :root{--paper:#FBF6EE;--card:#fff;--ink:#2A2520;--soft:#6B6258;--faint:#8A8278;--line:#EAE0CE;--coral:#FF6F50;
      --happy:#FFC95C;--flutter:#FF9A8B;--calm:#9CC3A6;--blue:#8AA0C9;--angry:#E2725B}
    *{box-sizing:border-box}body{margin:0;background:#F1EADC;color:var(--ink);font-family:'Pretendard',sans-serif;font-weight:500}
    .wrap{max-width:760px;margin:0 auto;padding:28px 20px 80px}
    h1{font-size:24px;margin:0 0 4px} .lead{color:var(--soft);font-size:14px;line-height:1.6;margin:0 0 18px}
    .bar{position:sticky;top:0;z-index:5;display:flex;flex-wrap:wrap;gap:8px;padding:12px 0;background:#F1EADC}
    button,.btn{font:inherit;font-weight:700;cursor:pointer}
    .b{border:0;border-radius:12px;padding:11px 14px;font-size:14px}
    .b-pri{background:var(--coral);color:#fff} .b-gho{background:#fff;color:var(--coral);border:1.5px solid var(--coral)}
    .b-mut{background:#EDE6D8;color:var(--soft)}
    .mood{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
    .mood__h{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px;margin-bottom:10px}
    .dot{width:14px;height:14px;border-radius:50%}
    .song{display:flex;align-items:center;gap:8px;padding:9px 0;border-top:1px solid var(--line);font-size:14px}
    .song:first-of-type{border-top:0}
    .song .meta{flex:1;min-width:0}
    .song .meta b{font-weight:700} .song .meta small{color:var(--faint);display:block;font-size:12px;margin-top:1px}
    .tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;background:#EDE6D8;color:var(--soft)}
    .tag.yt{background:#FDE2DC;color:#C0392B} .tag.suno{background:#E7E0F5;color:#6C4FB0}
    .rm{border:0;background:none;color:var(--faint);font-size:18px;cursor:pointer;padding:0 4px}
    .add{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .add input,.add select{font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;min-width:0}
    .add .full{grid-column:1/3}
    .hint{font-size:12px;color:var(--faint);margin-top:6px}
    dialog{border:0;border-radius:16px;padding:18px;max-width:90vw;width:560px}
    textarea{width:100%;height:240px;font-family:ui-monospace,monospace;font-size:12px;border:1px solid var(--line);border-radius:10px;padding:10px}
    .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s}
    .toast.on{opacity:1}
    a.back{color:var(--coral);font-weight:700;text-decoration:none;font-size:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="./">← 앱으로</a>
    <h1>음악 관리 · 관리자</h1>
    <p class="lead">기분별 곡을 관리합니다. <b>YouTube 영상 URL/ID</b>를 넣으면 앱이 <b>인앱 임베드 재생</b>하고, 없으면 검색 링크로 연결합니다.
      내 <b>Suno 곡</b>은 유튜브에 올린 뒤 그 URL을 넣으세요(같은 임베드). 변경은 <b>이 기기에 즉시 반영</b>되고,
      <b>모두에게 적용</b>하려면 “코드 내보내기 → <code>js/data/songs.js</code> 교체 커밋”.</p>

    <div class="bar">
      <button class="b b-pri" id="save">이 기기에 저장</button>
      <button class="b b-gho" id="expCode">코드 내보내기</button>
      <button class="b b-gho" id="expJson">JSON 내보내기</button>
      <button class="b b-gho" id="impJson">JSON 가져오기</button>
      <button class="b b-mut" id="reset">시드로 초기화</button>
    </div>
    <div id="moods"></div>
  </div>

  <dialog id="codeDlg"><h3 style="margin:0 0 10px">코드 내보내기 — js/data/songs.js</h3>
    <p style="font-size:13px;color:#6B6258;margin:0 0 10px">전체를 복사해 <code>js/data/songs.js</code>에 붙여넣고 커밋하면 모든 사용자에게 적용됩니다.</p>
    <textarea id="codeOut" readonly></textarea>
    <div style="display:flex;gap:8px;margin-top:10px"><button class="b b-pri" id="copyCode">복사</button><button class="b b-mut" id="closeDlg">닫기</button></div>
  </dialog>
  <input type="file" id="file" accept="application/json" hidden />
  <div class="toast" id="toast"></div>

  <script type="module">
    import { loadCatalog, saveCatalog, resetCatalog, parseYouTubeId, SEED, MOOD_KEYS } from './js/catalog.js';
    import { MOODS } from './js/data/moods.js';
    const KO = Object.fromEntries(MOODS.map(m => [m.id, m.ko]));
    const COL = { happy:'#FFC95C', flutter:'#FF9A8B', calm:'#9CC3A6', blue:'#8AA0C9', angry:'#E2725B' };
    let cat = structuredClone(loadCatalog());
    for (const m of MOOD_KEYS) if (!Array.isArray(cat[m])) cat[m] = [];
    const $ = (s) => document.querySelector(s);
    const toast = (t) => { const e = $('#toast'); e.textContent = t; e.classList.add('on'); setTimeout(() => e.classList.remove('on'), 1700); };

    function render() {
      const root = $('#moods'); root.innerHTML = '';
      for (const m of MOOD_KEYS) {
        const sec = document.createElement('div'); sec.className = 'mood';
        const songs = cat[m].map((s, i) => {
          const ytId = s.youtubeId ? parseYouTubeId(s.youtubeId) : '';
          const tag = ytId ? `<span class="tag ${s.source === 'suno' ? 'suno' : 'yt'}">${s.source === 'suno' ? 'Suno' : 'YouTube'} ▶</span>` : '<span class="tag">검색링크</span>';
          return `<div class="song"><div class="meta"><b>${esc(s.title)}</b> · ${esc(s.artist || '')} ${tag}<small>${ytId ? 'youtu.be/' + ytId : (s.url || '검색')}</small></div><button class="rm" data-m="${m}" data-i="${i}" title="삭제">×</button></div>`;
        }).join('') || '<div class="song" style="color:var(--faint)">아직 곡이 없어요</div>';
        sec.innerHTML = `<div class="mood__h"><span class="dot" style="background:${COL[m]}"></span>${KO[m]} <span style="color:var(--faint);font-weight:600;font-size:13px">(${cat[m].length})</span></div>
          ${songs}
          <div class="add">
            <input placeholder="제목" data-f="title" data-m="${m}">
            <input placeholder="아티스트" data-f="artist" data-m="${m}">
            <input class="full" placeholder="YouTube URL 또는 영상 ID (선택 — 있으면 인앱 재생)" data-f="yt" data-m="${m}">
            <select data-f="source" data-m="${m}"><option value="artist">가수곡</option><option value="suno">내 Suno 곡</option></select>
            <button class="b b-gho" data-add="${m}">+ 추가</button>
          </div>
          <div class="hint">Suno 곡: 유튜브에 업로드한 뒤 그 URL을 넣으면 됩니다. 재생목록(플리)은 영상별로 추가하세요.</div>`;
        root.appendChild(sec);
      }
      root.querySelectorAll('.rm').forEach(b => b.onclick = () => { cat[b.dataset.m].splice(+b.dataset.i, 1); render(); });
      root.querySelectorAll('[data-add]').forEach(b => b.onclick = () => addSong(b.dataset.add, b.parentElement));
    }
    function addSong(m, form) {
      const get = (f) => form.querySelector(`[data-f="${f}"]`);
      const title = get('title').value.trim(); if (!title) { toast('제목을 입력하세요'); return; }
      const artist = get('artist').value.trim();
      const ytRaw = get('yt').value.trim();
      const source = get('source').value;
      const song = { title, artist, source };
      const id = parseYouTubeId(ytRaw);
      if (ytRaw && !id) { toast('YouTube URL/ID를 인식 못 했어요'); return; }
      if (id) { song.youtubeId = id; song.url = 'https://www.youtube.com/watch?v=' + id; }
      else { song.url = 'https://music.youtube.com/search?q=' + encodeURIComponent(`${artist} ${title}`); }
      cat[m].push(song); render(); toast('추가됨 (저장 잊지 마세요)');
    }
    const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    $('#save').onclick = () => { saveCatalog(cat) ? toast('이 기기에 저장됐어요') : toast('저장 실패'); };
    $('#reset').onclick = () => { if (confirm('시드(기본 곡)로 되돌릴까요? 이 기기 저장이 삭제됩니다.')) { resetCatalog(); cat = structuredClone(SEED); for (const m of MOOD_KEYS) if (!Array.isArray(cat[m])) cat[m] = []; render(); toast('시드로 초기화'); } };
    $('#expJson').onclick = () => { dl('oneul-catalog.json', JSON.stringify(cat, null, 2)); };
    $('#impJson').onclick = () => $('#file').click();
    $('#file').onchange = (e) => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { try { const c = JSON.parse(r.result); cat = {}; for (const m of MOOD_KEYS) cat[m] = Array.isArray(c[m]) ? c[m] : []; render(); toast('가져왔어요'); } catch (x) { toast('JSON 파싱 실패'); } }; r.readAsText(f); };
    $('#expCode').onclick = () => {
      const body = MOOD_KEYS.map(m => `  ${m}: [\n` + cat[m].map(s => '    ' + JSON.stringify(s)).join(',\n') + (cat[m].length ? '\n' : '') + '  ],').join('\n');
      $('#codeOut').value = `// 오늘 기분 — 음악 카탈로그 (관리자 내보내기). YouTube 임베드 우선, 없으면 검색 링크.\nexport const SONGS = {\n${body}\n};\n`;
      $('#codeDlg').showModal();
    };
    $('#copyCode').onclick = async () => { try { await navigator.clipboard.writeText($('#codeOut').value); toast('복사됨'); } catch (e) { $('#codeOut').select(); document.execCommand('copy'); toast('복사됨'); } };
    $('#closeDlg').onclick = () => $('#codeDlg').close();
    function dl(name, text) { const b = new Blob([text], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = name; a.click(); }
    render();
  </script>
</body>
</html>
