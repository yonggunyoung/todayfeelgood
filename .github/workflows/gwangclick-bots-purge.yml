# ── 광클대전 봇 회수(수동 전용) ──
# 심어둔 봇을 흔적 없이 제거. 집계에서 원장만큼 정확히 빼고 봇 점수문서를 삭제(실데이터 무손상).
# Actions 탭 → 이 워크플로 → "Run workflow" 버튼으로 실행.
#   scope=all  : 원장에 있는 모든 날짜 제거(기본)
#   scope=date : date 입력의 하루만 제거
# 시크릿 GCP_SERVICE_ACCOUNT 필요(seed 워크플로와 동일).
name: gwangclick-bots-purge

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "all(전체) 또는 date(특정일)"
        type: choice
        options: ["all", "date"]
        default: "all"
        required: true
      date:
        description: "scope=date일 때 날짜 YYYY-MM-DD"
        required: false
      dry:
        description: "미리보기만(삭제 안 함)"
        type: boolean
        default: false

concurrency:
  group: gwangclick-bots
  cancel-in-progress: false

jobs:
  purge:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    defaults:
      run:
        working-directory: tools/bots
    steps:
      - uses: actions/checkout@v4

      - name: Guard — 시크릿 확인
        id: guard
        run: |
          if [ -z "${{ secrets.GCP_SERVICE_ACCOUNT }}" ]; then
            echo "::error::GCP_SERVICE_ACCOUNT 미설정 — 회수 불가."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 서비스 계정 키 작성
        run: printf '%s' '${{ secrets.GCP_SERVICE_ACCOUNT }}' > service-account.json

      - name: 의존성 설치
        run: npm install --no-audit --no-fund

      - name: 봇 회수 실행
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.scope }}" = "date" ]; then ARGS="--date ${{ github.event.inputs.date }}"; else ARGS="--all"; fi
          if [ "${{ github.event.inputs.dry }}" = "true" ]; then ARGS="$ARGS --dry"; fi
          echo "purge $ARGS"
          node purge.mjs $ARGS

      - name: 키 삭제(흔적 제거)
        if: always()
        run: rm -f service-account.json
