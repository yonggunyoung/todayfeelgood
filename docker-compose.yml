# ── webapp 모노레포 — docker compose (Oracle 무료티어) ──
#
# 구성: 엔진(FastAPI) + Next 앱 6개 + nginx 리버스프록시(80).
#   nginx 만 호스트 80 포트를 공개한다. 나머지는 내부 네트워크 전용(엔진·앱 직노출 금지).
#
# 사용:
#   cp .env.example .env   # 값 채우기
#   docker compose up -d --build
#
# 무료티어 메모리: 6개 Next 빌드를 동시에 하면 OOM 위험.
#   docs/deploy.md 의 "빌드 분리/스왑" 팁 참고(예: --build 대신 순차 build).

services:
  # ── 폰트 엔진 (FastAPI) — 내부 전용, 호스트로 포트 노출하지 않음 ──
  engine:
    build:
      context: ./apps/font/engine
      dockerfile: Dockerfile
    environment:
      # 브라우저가 직접 호출하지 않고 앱 BFF가 서버측에서 호출하므로 CORS는 보조 방어선.
      # 운영 도메인을 넣어 둔다(.env 의 ALLOWED_ORIGINS).
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    expose:
      - "8000"
    restart: unless-stopped
    networks: [webapp]
    healthcheck:
      # 엔진 자체 /health (폰트 로드 여부 포함). python으로 의존성 추가 없이 체크.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── 메인 홈페이지 (Next, 루트) ──
  home:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        WORKSPACE: "@webapp/home"
        APP_DIR: home
        BASE_PATH: ""
        PORT: "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
    expose:
      - "3000"
    restart: unless-stopped
    networks: [webapp]

  # ── 폰트공방 (/font) ──
  font:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        WORKSPACE: "@webapp/font-frontend"
        APP_DIR: apps/font/frontend
        BASE_PATH: /font
        PORT: "3001"
    environment:
      NODE_ENV: production
      BASE_PATH: /font
      PORT: "3001"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
      # 서버측 BFF가 호출할 엔진 주소(서비스명 기반).
      ENGINE_URL: ${ENGINE_URL:-http://engine:8000}
    expose:
      - "3001"
    depends_on:
      engine:
        condition: service_started
    restart: unless-stopped
    networks: [webapp]

  # ── 스티커공방 (/sticker) ──
  sticker:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        WORKSPACE: "@webapp/sticker-frontend"
        APP_DIR: apps/sticker/frontend
        BASE_PATH: /sticker
        PORT: "3002"
    environment:
      NODE_ENV: production
      BASE_PATH: /sticker
      PORT: "3002"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
      ENGINE_URL: ${ENGINE_URL:-http://engine:8000}
    expose:
      - "3002"
    depends_on:
      engine:
        condition: service_started
    restart: unless-stopped
    networks: [webapp]

  # ── 싸인공방 (/sign) ──
  sign:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        WORKSPACE: "@webapp/sign-frontend"
        APP_DIR: apps/sign/frontend
        BASE_PATH: /sign
        PORT: "3003"
    environment:
      NODE_ENV: production
      BASE_PATH: /sign
      PORT: "3003"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
      ENGINE_URL: ${ENGINE_URL:-http://engine:8000}
    expose:
      - "3003"
    depends_on:
      engine:
        condition: service_started
    restart: unless-stopped
    networks: [webapp]

  # ── 브랜드키트 (/kit) ──
  kit:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        WORKSPACE: "@webapp/kit-frontend"
        APP_DIR: apps/kit/frontend
        BASE_PATH: /kit
        PORT: "3004"
    environment:
      NODE_ENV: production
      BASE_PATH: /kit
      PORT: "3004"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
      ENGINE_URL: ${ENGINE_URL:-http://engine:8000}
    expose:
      - "3004"
    depends_on:
      engine:
        condition: service_started
    restart: unless-stopped
    networks: [webapp]

  # ── 텍스트모지 (/textmoji) ──
  # 주의: 앱 package.json 의 start 스크립트는 -p 3003 이지만, 여기서는 PORT=3005 를
  #       주입하고 Dockerfile.next 가 `next start -p $PORT` 로 띄우므로 3005 로 뜬다.
  textmoji:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        WORKSPACE: "@webapp/textmoji-frontend"
        APP_DIR: apps/textmoji/frontend
        BASE_PATH: /textmoji
        PORT: "3005"
    environment:
      NODE_ENV: production
      BASE_PATH: /textmoji
      PORT: "3005"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
      ENGINE_URL: ${ENGINE_URL:-http://engine:8000}
    expose:
      - "3005"
    depends_on:
      engine:
        condition: service_started
    restart: unless-stopped
    networks: [webapp]

  # ── nginx 리버스프록시 (유일하게 호스트 포트 공개) ──
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # TLS는 certbot 적용 후 443 추가(docs/deploy.md 참고).
      # - "443:443"
    volumes:
      # 도커용 라우팅 conf(서비스명 upstream)를 마운트.
      - ./infra/nginx/webapp.compose.conf:/etc/nginx/conf.d/default.conf:ro
      # certbot 사용 시 인증서 디렉터리 마운트(주석 해제).
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - home
      - font
      - sticker
      - sign
      - kit
      - textmoji
    restart: unless-stopped
    networks: [webapp]

networks:
  webapp:
    driver: bridge
