# 서버 함수 자동 배포 — functions/ 가 바뀌어 main에 올라오면 firebase deploy 를 자동 실행.
# (앱 화면은 pages.yml이 자동 배포, 서버 함수는 그동안 수동이었음 → 이걸로 둘 다 자동화)
# 인증: 레포 Secrets 에 아래 중 하나만 등록하면 됨
#   - FIREBASE_TOKEN          : `firebase login:ci` 로 발급한 토큰(가장 간단)
#   - FIREBASE_SERVICE_ACCOUNT: 서비스계정 키 JSON(터미널 없이 콘솔만으로)
name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths: ['functions/**']
  workflow_dispatch: {} # Actions 탭에서 수동 실행(첫 배포용 "Run workflow" 버튼)

permissions:
  contents: read

concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install function dependencies
        run: npm --prefix functions install
      - name: Install firebase-tools
        run: npm install -g firebase-tools@^13
      - name: Deploy functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
            export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"; unset FIREBASE_TOKEN
            echo "서비스계정 자격증명으로 배포합니다."
          elif [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN(또는 FIREBASE_SERVICE_ACCOUNT) 시크릿이 없어요. 레포 Settings → Secrets and variables → Actions 에 등록한 뒤 다시 실행하세요."
            exit 1
          else
            echo "FIREBASE_TOKEN 으로 배포합니다."
          fi
          firebase deploy --only functions --project icebi-308e0 --force --non-interactive
