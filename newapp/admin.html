<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>음악 관리 · 관리자 — 오늘 기분</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    :root{--paper:#FBF6EE;--card:#fff;--ink:#2A2520;--soft:#6B6258;--faint:#8A8278;--line:#EAE0CE;--coral:#FF6F50;
      --happy:#FFC95C;--flutter:#FF9A8B;--calm:#9CC3A6;--blue:#8AA0C9;--angry:#E2725B}
    *{box-sizing:border-box}body{margin:0;background:#F1EADC;color:var(--ink);font-family:'Pretendard',sans-serif;font-weight:500}
    .wrap{max-width:760px;margin:0 auto;padding:28px 20px 80px}
    h1{font-size:24px;margin:0 0 4px} .lead{color:var(--soft);font-size:14px;line-height:1.6;margin:0 0 18px}
    .bar{position:sticky;top:0;z-index:5;display:flex;flex-wrap:wrap;gap:8px;padding:12px 0;background:#F1EADC}
    button,.btn{font:inherit;font-weight:700;cursor:pointer}
    .b{border:0;border-radius:12px;padding:11px 14px;font-size:14px}
    .b-pri{background:var(--coral);color:#fff} .b-gho{background:#fff;color:var(--coral);border:1.5px solid var(--coral)}
    .b-mut{background:#EDE6D8;color:var(--soft)}
    .mood{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
    .mood__h{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px;margin-bottom:10px}
    .dot{width:14px;height:14px;border-radius:50%}
    .song{display:flex;align-items:center;gap:8px;padding:9px 0;border-top:1px solid var(--line);font-size:14px}
    .song:first-of-type{border-top:0}
    .song .meta{flex:1;min-width:0}
    .song .meta b{font-weight:700} .song .meta small{color:var(--faint);display:block;font-size:12px;margin-top:1px}
    .tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;background:#EDE6D8;color:var(--soft)}
    .tag.yt{background:#FDE2DC;color:#C0392B} .tag.suno{background:#E7E0F5;color:#6C4FB0}
    .rm{border:0;background:none;color:var(--faint);font-size:18px;cursor:pointer;padding:0 4px}
    .add{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .add input,.add select{font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;min-width:0}
    .add .full{grid-column:1/3}
    .hint{font-size:12px;color:var(--faint);margin-top:6px}
    dialog{border:0;border-radius:16px;padding:18px;max-width:90vw;width:560px}
    textarea{width:100%;height:240px;font-family:ui-monospace,monospace;font-size:12px;border:1px solid var(--line);border-radius:10px;padding:10px}
    .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s}
    .toast.on{opacity:1}
    a.back{color:var(--coral);font-weight:700;text-decoration:none;font-size:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="./">← 앱으로</a>
    <h1>음악 관리 · 관리자</h1>
    <p class="lead">기분별 곡을 관리합니다. <b>YouTube 영상 URL/ID</b>를 넣으면 앱이 <b>인앱 임베드 재생</b>하고, 없으면 검색 링크로 연결합니다.
      내 <b>Suno 곡</b>은 유튜브에 올린 뒤 그 URL을 넣으세요(같은 임베드). 변경은 <b>이 기기에 즉시 반영</b>되고,
      <b>모두에게 적용</b>하려면 “코드 내보내기 → <code>js/data/songs.js</code> 교체 커밋”.</p>

    <div class="bar">
      <button class="b b-pri" id="save">이 기기에 저장</button>
      <button class="b b-gho" id="expCode">코드 내보내기</button>
      <button class="b b-gho" id="expJson">JSON 내보내기</button>
      <button class="b b-gho" id="impJson">JSON 가져오기</button>
      <button class="b b-mut" id="reset">시드로 초기화</button>
    </div>
    <div id="moods"></div>
  </div>

  <dialog id="codeDlg"><h3 style="margin:0 0 10px">코드 내보내기 — js/data/songs.js</h3>
    <p style="font-size:13px;color:#6B6258;margin:0 0 10px">전체를 복사해 <code>js/data/songs.js</code>에 붙여넣고 커밋하면 모든 사용자에게 적용됩니다.</p>
    <textarea id="codeOut" readonly></textarea>
    <div style="display:flex;gap:8px;margin-top:10px"><button class="b b-pri" id="copyCode">복사</button><button class="b b-mut" id="closeDlg">닫기</button></div>
  </dialog>
  <input type="file" id="file" accept="application/json" hidden />
  <div class="toast" id="toast"></div>

  <script type="module" src="./js/admin.js"></script>
</body>
</html>
