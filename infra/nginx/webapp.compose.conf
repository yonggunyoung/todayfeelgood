# webapp 모노레포 — nginx 라우팅 (docker compose 버전)
#
# webapp.conf 와 동일한 라우팅이지만, upstream 을 127.0.0.1:포트 대신
# docker compose 서비스명으로 가리킨다(같은 도커 네트워크 내부 DNS).
# 비도커(프로세스) 배포에는 webapp.conf 를 쓰고, 도커 배포에는 이 파일을 쓴다.
#
# 서비스명·포트는 docker-compose.yml 과 정합:
#   home(3000) / font(3001) / sticker(3002) / sign(3003) / kit(3004) / textmoji(3005)
#   engine(8000) — 외부 비노출, 앱 BFF에서만 호출(여기서 프록시하지 않음).

upstream home_app     { server home:3000; }
upstream font_app     { server font:3001; }
upstream sticker_app  { server sticker:3002; }
upstream sign_app     { server sign:3003; }
upstream kit_app      { server kit:3004; }
upstream textmoji_app { server textmoji:3005; }

server {
    listen 80;
    server_name ddukkit.com www.ddukkit.com;   # 다른 도메인으로 운영 시 교체(webapp.conf와 정합)

    client_max_body_size 4m;   # 그린 PNG 등 대비(앱/엔진 2MB 상한과 정합)

    # 도커 내부 DNS는 컨테이너 재기동 시 IP가 바뀔 수 있다.
    # resolver + 변수화로 nginx 기동 시점에 upstream 미존재라도 죽지 않게 한다.
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /font {
        proxy_pass http://font_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /sticker {
        proxy_pass http://sticker_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /sign {
        proxy_pass http://sign_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /kit {
        proxy_pass http://kit_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /textmoji {
        proxy_pass http://textmoji_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 메인 홈페이지 ──
    location / {
        proxy_pass http://home_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
